# .github/workflows/main.yml

name: Netflix Korea Daily Ranking

on:
  schedule:
    - cron: '50 23 * * *'   # KST 08:50 = UTC 23:50 (전날)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  scrape:
    name: 📊 Netflix 순위 수집
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Netflix 순위 수집 실행
        env:
          TZ: Asia/Seoul
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          echo "실행 시각 (KST): $(TZ=Asia/Seoul date)"
          python netflix.py

      - name: 데이터 커밋 및 푸시
        env:
          TZ: Asia/Seoul
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/
          if git diff --cached --quiet; then
            echo "변경사항 없음, 커밋 생략"
          else
            DATE_KST=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "📊 Netflix 한국 순위 업데이트 - ${DATE_KST}"
            git push
            echo "커밋 & 푸시 완료"
          fi

  deploy:
    name: 🚀 GitHub Pages 배포
    needs: scrape
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 배포 완료 알림
        run: |
          echo "✅ 배포 완료!"
          echo "🌐 페이지 URL: ${{ steps.deployment.outputs.page_url }}"
