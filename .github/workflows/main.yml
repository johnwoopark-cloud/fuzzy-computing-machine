# .github/workflows/main.yml
# ──────────────────────────────────────────────────────────────
#  Netflix Korea Top 20 Weekly Tracker  (공식 Tudum 기준)
#  매주 화요일 KST 08:50 자동 실행 (Netflix 업데이트 주기 반영)
#  + workflow_dispatch 로 언제든 수동 실행 가능
# ──────────────────────────────────────────────────────────────

name: Netflix Korea Weekly Ranking

on:
  # Netflix Tudum은 매주 화요일 업데이트 → KST 화 08:50 = UTC 월 23:50
  schedule:
    - cron: '50 23 * * 1'   # UTC 월요일 23:50 = KST 화요일 08:50

  # 수동 실행 (Actions 탭 → Run workflow)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ────────────────────────────────────────
  #  JOB 1: 순위 수집 및 저장
  # ────────────────────────────────────────
  scrape:
    name: 📊 Netflix 순위 수집 (Tudum 공식)
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python 의존성 설치
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright

      # Playwright 헤드리스 브라우저 (Chromium) 설치
      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      - name: Netflix Tudum 순위 수집
        env:
          TZ: Asia/Seoul
        run: |
          echo "실행 시각 (KST): $(TZ=Asia/Seoul date)"
          python netflix.py

      - name: 데이터 커밋 및 푸시
        env:
          TZ: Asia/Seoul
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/
          if git diff --cached --quiet; then
            echo "변경사항 없음, 커밋 생략"
          else
            DATE_KST=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "📊 Netflix 한국 순위 업데이트 (Tudum 공식) - ${DATE_KST}"
            git push
            echo "커밋 & 푸시 완료"
          fi

  # ────────────────────────────────────────
  #  JOB 2: GitHub Pages 배포
  # ────────────────────────────────────────
  deploy:
    name: 🚀 GitHub Pages 배포
    needs: scrape
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 배포 완료 알림
        run: |
          echo "✅ 배포 완료!"
          echo "🌐 페이지 URL: ${{ steps.deployment.outputs.page_url }}"
